<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Detection Model Comparison - WildDet3D-Bench box prompts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <a href="../" class="back-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Home
                </a>
                <h1 class="header-title">3D Detection Model Comparison - WildDet3D-Bench box prompts</h1>
                <!--
                <div class="header-stats" id="header-stats">
                    <div class="stat-item">
                        <span class="stat-value" id="stat-total">-</span>
                        <span class="stat-label">Total Images</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="stat-with-dets">-</span>
                        <span class="stat-label" id="stat-with-dets-label">With GT 3D Box(es)<br><span style="visibility:hidden">From All Models</span></span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="stat-categories">-</span>
                        <span class="stat-label">Scene Categories</span>
                    </div>
                </div>
                -->
            </div>
        </header>

        <!-- Main Content -->
        <div class="main-layout">
            <!-- Sidebar: Scene Tree -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h2 class="sidebar-title">Scene Categories</h2>
                    <button class="btn-collapse-all" id="btn-collapse-all" title="Collapse All">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="4 14 10 14 10 20"></polyline>
                            <polyline points="20 10 14 10 14 4"></polyline>
                            <line x1="14" y1="10" x2="21" y2="3"></line>
                            <line x1="3" y1="21" x2="10" y2="14"></line>
                        </svg>
                    </button>
                </div>
                <div class="tree-container" id="tree-container">
                    <div class="loading">Loading scene tree...</div>
                </div>
            </aside>

            <!-- Content: Image Grid -->
            <main class="content">
                <div class="content-header">
                    <h2 class="content-title" id="content-title">All Images</h2>
                    <div class="content-controls">
                        <div class="search-box">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                            <input type="text" id="search-input" placeholder="Search by image ID...">
                        </div>
                        <div class="filter-buttons">
                            <button class="filter-btn active" data-filter="all">All</button>
                            <button class="filter-btn" data-filter="coco_val">COCO Val</button>
                            <button class="filter-btn" data-filter="coco_train">COCO Train</button>
                            <button class="filter-btn" data-filter="obj365_val">Obj365 Val</button>
                        </div>
                        <label class="control-checkbox" id="all-models-filter">
                            <input type="checkbox" id="require-all-models">
                            <span>All models</span>
                        </label>
                        <label class="control-checkbox">
                            <input type="checkbox" id="shuffle-images" checked>
                            <span>Shuffle</span>
                        </label>
                    </div>
                </div>

                <div class="image-grid" id="image-grid">
                    <div class="loading">Loading images...</div>
                </div>

                <div class="pagination" id="pagination">
                    <!-- Pagination rendered by JS -->
                </div>
            </main>
        </div>
    </div>

    <script src="js/scene-tree.js"></script>
    <script src="js/app.js"></script>
    <script src="js/gallery.js"></script>
</body>
</html>
